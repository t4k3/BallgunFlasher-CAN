<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Contatori Sì / No</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #1a1d24;
      --si: #2ecc71;
      --no: #e74c3c;
      --undo: #34495e;
      --text: #f5f6fa;
      --muted: #8a909c;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    header {
      text-align: center;
      padding: 16px 12px 8px;
    }
    header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--muted);
    }
    .counters {
      flex: 1;
      display: flex;
      gap: 12px;
      padding: 12px;
    }
    .counter {
      flex: 1;
      border: none;
      border-radius: 24px;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.08s ease, filter 0.15s ease;
      user-select: none;
    }
    .counter:active { transform: scale(0.97); filter: brightness(1.15); }
    .counter.si { background: var(--si); }
    .counter.no { background: var(--no); }
    .counter .label {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .counter .value {
      font-size: 88px;
      font-weight: 800;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .counter .hint {
      font-size: 13px;
      opacity: 0.75;
    }
    footer {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .undo {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 18px;
      background: var(--undo);
      color: var(--text);
      font-size: 18px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.15s ease;
    }
    .undo:active { transform: scale(0.98); }
    .undo:disabled { opacity: 0.4; cursor: default; }
    .reset {
      align-self: center;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 13px;
      padding: 6px 12px;
      font-family: inherit;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <h1>CONTATORI</h1>
  </header>

  <main class="counters">
    <button class="counter si" id="btnSi" aria-label="Aggiungi Sì">
      <span class="label">SÌ</span>
      <span class="value" id="valSi">0</span>
      <span class="hint">tocca per +1</span>
    </button>
    <button class="counter no" id="btnNo" aria-label="Aggiungi No">
      <span class="label">NO</span>
      <span class="value" id="valNo">0</span>
      <span class="hint">tocca per +1</span>
    </button>
  </main>

  <footer>
    <button class="undo" id="btnUndo" disabled>↶ Annulla ultimo</button>
    <button class="reset" id="btnReset">Azzera tutto</button>
  </footer>

  <script>
    (function () {
      const KEY = 'contatori-si-no-v1';
      let state = { si: 0, no: 0, history: [] };

      const valSi = document.getElementById('valSi');
      const valNo = document.getElementById('valNo');
      const btnSi = document.getElementById('btnSi');
      const btnNo = document.getElementById('btnNo');
      const btnUndo = document.getElementById('btnUndo');
      const btnReset = document.getElementById('btnReset');

      function load() {
        try {
          const raw = localStorage.getItem(KEY);
          if (raw) state = Object.assign(state, JSON.parse(raw));
        } catch (e) {}
      }
      function save() {
        try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) {}
      }
      function render() {
        valSi.textContent = state.si;
        valNo.textContent = state.no;
        btnUndo.disabled = state.history.length === 0;
      }
      function buzz() {
        if (navigator.vibrate) navigator.vibrate(15);
      }

      function add(type) {
        state[type]++;
        state.history.push(type);
        buzz();
        save();
        render();
      }
      function undo() {
        const last = state.history.pop();
        if (!last) return;
        state[last] = Math.max(0, state[last] - 1);
        buzz();
        save();
        render();
      }
      function reset() {
        if (!confirm('Azzerare entrambi i contatori?')) return;
        state.si = 0;
        state.no = 0;
        state.history = [];
        save();
        render();
      }

      btnSi.addEventListener('click', () => add('si'));
      btnNo.addEventListener('click', () => add('no'));
      btnUndo.addEventListener('click', undo);
      btnReset.addEventListener('click', reset);

      load();
      render();
    })();
  </script>
</body>
</html>
